{{- /*
  icons.html — single-template icon library.

  Usage:  {{template "icon" (dict "name" "moon")}}
  Add a new icon: append a branch below.
  All icons are 20×20, 1.5 stroke, currentColor — they inherit text color.
*/ -}}
{{define "icon"}}
{{- $n := .name -}}
<svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
     stroke-linejoin="round" aria-hidden="true" focusable="false">
{{- if eq $n "grid" -}}
    <rect x="3" y="3" width="7" height="7" rx="1.5"/>
    <rect x="14" y="3" width="7" height="7" rx="1.5"/>
    <rect x="3" y="14" width="7" height="7" rx="1.5"/>
    <rect x="14" y="14" width="7" height="7" rx="1.5"/>
{{- else if eq $n "check" -}}
    <path d="M5 12l4 4L19 6"/>
{{- else if eq $n "sun" -}}
    <circle cx="12" cy="12" r="4"/>
    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
{{- else if eq $n "moon" -}}
    <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
{{- else if eq $n "calendar" -}}
    <rect x="3" y="4" width="18" height="18" rx="2"/>
    <path d="M16 2v4M8 2v4M3 10h18"/>
{{- else if eq $n "chart" -}}
    <path d="M3 3v18h18"/>
    <path d="M7 14l4-4 4 4 5-5"/>
{{- else if eq $n "menu" -}}
    <path d="M4 6h16M4 12h16M4 18h16"/>
{{- else if eq $n "plus" -}}
    <path d="M12 5v14M5 12h14"/>
{{- else if eq $n "inbox" -}}
    <path d="M22 12h-6l-2 3h-4l-2-3H2"/>
    <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
{{- else if eq $n "note" -}}
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <path d="M14 2v6h6"/>
    <path d="M16 13H8"/>
    <path d="M16 17H8"/>
    <path d="M10 9H8"/>
{{- else if eq $n "edit" -}}
    <path d="M12 20h9"/>
    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
{{- else if eq $n "spark" -}}
    <path d="M12 2v6M12 16v6M2 12h6M16 12h6"/>
{{- else if eq $n "flame" -}}
    <path d="M8.5 14c0-3 3.5-5.5 3.5-9 3 1 5 4 5 8a5 5 0 0 1-10 0c0-1 .5-2 1.5-3z"/>
{{- else if eq $n "play" -}}
    <path d="M8 5v14l11-7z"/>
{{- else if eq $n "x" -}}
    <path d="M18 6L6 18M6 6l12 12"/>
{{- else if eq $n "refresh" -}}
    <path d="M3 12a9 9 0 0 1 15.5-6.36L21 8"/>
    <path d="M21 3v5h-5"/>
    <path d="M21 12a9 9 0 0 1-15.5 6.36L3 16"/>
    <path d="M3 21v-5h5"/>
{{- else if eq $n "trash" -}}
    <path d="M3 6h18"/>
    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
    <path d="M10 11v6M14 11v6"/>
    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
{{- else if eq $n "chevron-left" -}}
    <path d="M15 18l-6-6 6-6"/>
{{- else if eq $n "chevron-right" -}}
    <path d="M9 18l6-6-6-6"/>
{{- else if eq $n "alert" -}}
    <circle cx="12" cy="12" r="9"/>
    <path d="M12 8v4M12 16h.01"/>
{{- else if eq $n "loader" -}}
    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
{{- else if eq $n "briefcase" -}}
    <rect x="2" y="7" width="20" height="14" rx="2"/>
    <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
{{- else -}}
    <circle cx="12" cy="12" r="9"/>
{{- end -}}
</svg>
{{end}}
